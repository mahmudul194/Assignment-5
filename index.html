<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Github Issues Tracker</title>
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased min-h-screen">
    <section id="login-page" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-lg border border-slate-100 p-8 w-full max-w-md">
            <div class="text-center mb-8">
                <img src="./assets/github-logo.png" alt="GitHub Logo" class="w-16 h-16 mx-auto mb-4">
                <h1 class="text-2xl font-bold text-slate-800 tracking-tight">GitHub Issues Tracker</h1>
                <p class="text-slate-500 mt-1">Sign in to manage your issues</p>
            </div>

            <form id="login-form" class="space-y-5">
                <div>
                    <label for="username" class="block text-sm font-medium text-slate-700 mb-1">Username</label>
                    <input type="text" id="username"
                        class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-600 focus:border-indigo-600 outline-none transition-all"
                        placeholder="Enter Username">
                    <p class="text-xs text-indigo-600 mt-1">Default: admin</p>
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                    <input type="password" id="password"
                        class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-600 focus:border-indigo-600 outline-none transition-all"
                        placeholder="Enter Password">
                    <p class="text-xs text-indigo-600 mt-1">Default: admin123</p>
                </div>

                <div id="login-error" class="hidden text-sm text-red-500 text-center font-medium">Invalid credentials
                </div>

                <button type="submit"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-lg transition-colors shadow-sm">
                    Sign In
                </button>
            </form>

            <div class="mt-8 relative">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-slate-200"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-2 bg-white text-slate-500">OR</span>
                </div>
            </div>

            <div class="mt-6 text-center text-sm text-slate-500">
                <p>Demo Credentials:</p>
                <div class="bg-slate-50 p-3 rounded-lg mt-2 border border-slate-100">
                    <p class="font-medium text-slate-700">Username: <span
                            class="font-normal text-slate-500">admin</span></p>
                    <p class="font-medium text-slate-700">Password: <span
                            class="font-normal text-slate-500">admin123</span></p>
                </div>
            </div>
        </div>
    </section>

</body>
</html>
